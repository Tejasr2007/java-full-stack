<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>

```
<form>

    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Tejasree">
    <br><br>

    <label for="age">Age:</label>
    <input type="number" id="age" name="age" placeholder="25">
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="123@gmail.com">
    <br><br>

    <p>Gender:</p>

    <input type="radio" id="male" name="gender" value="Male">
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="Female">
    <label for="female">Female</label>

    <input type="radio" id="other" name="gender" value="Other">
    <label for="other">Don't Want to Mention</label>

    <br><br>

    <p>Qualifications:</p>

    <input type="checkbox" id="tenth" name="tenth">
    <label for="tenth">10<sup>th</sup></label>

    <input type="checkbox" id="twelfth" name="twelfth">
    <label for="twelfth">12<sup>th</sup></label>

    <input type="checkbox" id="diploma" name="diploma">
    <label for="diploma">Diploma</label>

    <input type="checkbox" id="degree" name="degree">
    <label for="degree">Degree</label>

    <input type="checkbox" id="masters" name="masters">
    <label for="masters">Masters</label>

    <input type="checkbox" id="phd" name="phd">
    <label for="phd">PhD</label>

    <br><br>

    <label for="password">Password:</label>
    <input type="password"
           id="password"
           name="password"
           placeholder="Enter Password"
           autocomplete="new-password">
    <br><br>

    <label for="date">Date:</label>
    <input type="date" id="date" name="date">
    <br><br>

    <label for="datetime">Date and Time:</label>
    <input type="datetime-local" id="datetime" name="datetime">
    <br><br>

    <label for="file">Upload File:</label>
    <input type="file" id="file" name="file">
    <br><br>

    <button type="submit">Submit</button>
    <button type="reset">Clear</button>

</form>

<header>
    <h3>Hello</h3>
</header>

<div id="div1">Hi</div>
<div id="div2">Hey</div>

<div class="cse">C++</div>

<footer>
    <p>6</p>
</footer>
```

</body>
</html>
